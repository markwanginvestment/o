<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛢️ 油价实时监控 - 马克老王能源中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #0a1628 0%, #1a2744 50%, #0d1b2a 100%);
            min-height: 100vh; color: #fff;
        }
        .navbar {
            background: rgba(10, 22, 40, 0.95); backdrop-filter: blur(10px);
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: sticky; top: 0; z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.3em; font-weight: bold; color: #00d4ff; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: #8892a0; text-decoration: none; font-size: 0.95em; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #00d4ff; }
        .update-badge {
            background: linear-gradient(45deg, #00d4ff, #00ff88); color: #0a1628;
            padding: 6px 15px; border-radius: 20px; font-size: 0.85em; font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 2.8em; margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #00d4ff, #7b2cbf); background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: gradient 4s ease infinite;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .header p { color: #8892a0; font-size: 1.1em; }
        .data-source { color: #666; font-size: 0.85em; margin-top: 10px; }
        .category-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .category-tab {
            padding: 10px 20px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05); color: #8892a0; cursor: pointer;
            transition: all 0.3s; font-size: 0.9em;
        }
        .category-tab:hover { background: rgba(255, 255, 255, 0.1); }
        .category-tab.active { background: linear-gradient(45deg, #00d4ff, #7b2cbf); border-color: transparent; color: #fff; }
        .prices-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .price-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 20px; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .price-card:hover { transform: translateY(-5px); border-color: rgba(0, 212, 255, 0.5); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .price-card.up { border-left: 3px solid #00ff88; }
        .price-card.down { border-left: 3px solid #ff4757; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .commodity-info { display: flex; align-items: center; gap: 10px; }
        .commodity-icon { font-size: 1.8em; }
        .commodity-name { font-weight: bold; font-size: 1.1em; }
        .commodity-code { color: #8892a0; font-size: 0.8em; }
        .trend-indicator { display: flex; align-items: center; gap: 5px; font-size: 0.85em; font-weight: bold; }
        .trend-up { color: #00ff88; } .trend-down { color: #ff4757; }
        .price-display { margin-bottom: 15px; }
        .price-value { font-size: 2em; font-weight: bold; margin-bottom: 5px; }
        .price-value.loading { color: #666; }
        .price-unit { color: #8892a0; font-size: 0.85em; }
        .price-change { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 15px; font-size: 0.85em; font-weight: bold; }
        .change-up { background: rgba(0, 255, 136, 0.15); color: #00ff88; }
        .change-down { background: rgba(255, 71, 87, 0.15); color: #ff4757; }
        .alert-btn { width: 100%; padding: 10px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); color: #8892a0; border-radius: 10px; cursor: pointer; transition: all 0.3s; font-size: 0.9em; margin-top: 10px; }
        .alert-btn:hover { background: rgba(0, 212, 255, 0.1); border-color: #00d4ff; color: #00d4ff; }
        .chart-section { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; margin-bottom: 40px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .chart-title { font-size: 1.3em; font-weight: bold; }
        .time-range { display: flex; gap: 10px; }
        .time-btn { padding: 8px 16px; border: 1px solid rgba(255, 255, 255, 0.2); background: transparent; color: #8892a0; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 0.85em; }
        .time-btn:hover, .time-btn.active { background: rgba(0, 212, 255, 0.2); border-color: #00d4ff; color: #00d4ff; }
        .chart-container { height: 300px; background: rgba(0, 0, 0, 0.2); border-radius: 12px; position: relative; overflow: hidden; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(123, 44, 191, 0.1)); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 16px; padding: 25px; text-align: center; }
        .stat-value { font-size: 2.5em; font-weight: bold; margin-bottom: 5px; background: linear-gradient(45deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-value.loading { color: #666; -webkit-text-fill-color: #666; }
        .stat-label { color: #8892a0; font-size: 0.95em; }
        footer { background: rgba(10, 22, 40, 0.8); border-top: 1px solid rgba(255, 255, 255, 0.1); padding: 40px 20px; text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; flex-wrap: wrap; }
        .footer-links a { color: #8892a0; text-decoration: none; transition: color 0.3s; }
        .footer-links a:hover { color: #00d4ff; }
        .copyright { color: #666; font-size: 0.9em; }
        .error-message { background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.3); color: #ff4757; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        @media (max-width: 768px) {
            .navbar { padding: 12px 15px; }
            .logo { font-size: 1em; }
            .nav-links { display: none; }
            .update-badge { font-size: 0.7em; padding: 4px 10px; }
            .container { padding: 20px 15px; }
            .header { margin-bottom: 25px; }
            .header h1 { font-size: 1.5em; }
            .header p { font-size: 0.9em; }
            .category-tabs { gap: 8px; margin-bottom: 20px; }
            .category-tab { padding: 8px 14px; font-size: 0.8em; }
            .prices-grid { grid-template-columns: 1fr; gap: 15px; }
            .price-card { padding: 15px; }
            .commodity-icon { font-size: 1.5em; }
            .commodity-name { font-size: 1em; }
            .price-value { font-size: 1.6em; }
            .chart-section { padding: 20px; }
            .chart-header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .chart-title { font-size: 1.1em; }
            .time-range { width: 100%; justify-content: space-between; }
            .time-btn { padding: 6px 12px; font-size: 0.8em; flex: 1; }
            .chart-container { height: 250px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .stat-card { padding: 20px 15px; }
            .stat-value { font-size: 1.8em; }
            .stat-label { font-size: 0.85em; }
            footer { padding: 30px 15px; }
            .footer-links { gap: 15px; font-size: 0.85em; }
        }
        @media (max-width: 480px) {
            .header h1 { font-size: 1.3em; }
            .category-tabs { justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 5px; }
            .category-tab { white-space: nowrap; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .stat-value { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🛢️ 马克老王能源中心</div>
        <div class="nav-links">
            <a href="#" class="active">📊 实时油价</a>
            <a href="#">📈 走势分析</a>
            <a href="#">🔔 价格提醒</a>
        </div>
        <div class="nav-right"><span class="update-badge">🔄 实时数据</span></div>
    </nav>
    <div class="container">
        <div class="header">
            <h1>🌍 全球能源价格实时监控</h1>
            <p>原油、黄金、外汇等大宗商品实时价格</p>
            <div class="data-source">数据来源: Yahoo Finance | 延迟: 约15分钟</div>
        </div>
        <div id="errorContainer"></div>
        <div class="category-tabs">
            <div class="category-tab active" onclick="filterCategory('all', this)">🔥 全部</div>
            <div class="category-tab" onclick="filterCategory('oil', this)">🛢️ 原油</div>
            <div class="category-tab" onclick="filterCategory('metal', this)">🥇 贵金属</div>
            <div class="category-tab" onclick="filterCategory('gas', this)">🔥 天然气</div>
            <div class="category-tab" onclick="filterCategory('currency', this)">💱 外汇</div>
        </div>
        <div class="prices-grid" id="pricesGrid">
            <div class="price-card">
                <div class="card-header">
                    <div class="commodity-info">
                        <span class="commodity-icon">⏳</span>
                        <div>
                            <div class="commodity-name">加载中...</div>
                            <div class="commodity-code">请稍候</div>
                        </div>
                    </div>
                </div>
                <div class="price-display">
                    <div class="price-value loading">--</div>
                </div>
            </div>
        </div>
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value loading" id="avgOil">--</div>
                <div class="stat-label">原油平均价格</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: #00ff88;" id="topGainer">--</div>
                <div class="stat-label">今日最高涨幅</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: #ff4757;" id="topLoser">--</div>
                <div class="stat-label">今日最大跌幅</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: #ffd93d;" id="lastUpdate">--</div>
                <div class="stat-label">最后更新</div>
            </div>
        </div>
    </div>
    <footer>
        <div class="footer-content">
            <div class="footer-links"><a href="#">关于我们</a><a href="#">API文档</a><a href="#">价格说明</a><a href="#">联系我们</a></div>
            <p class="copyright">© 2026 马克老王能源中心 | 数据仅供参考，投资有风险</p>
        </div>
    </footer>
    <script>
        // 商品配置 - 使用Yahoo Finance符号
        const commodities = [
            // 原油
            { id: 1, name: '布伦特原油', code: 'BZ=F', icon: '🛢️', category: 'oil', unit: '美元/桶', yahooSymbol: 'BZ=F' },
            { id: 2, name: 'WTI原油', code: 'CL=F', icon: '🛢️', category: 'oil', unit: '美元/桶', yahooSymbol: 'CL=F' },
            // 贵金属
            { id: 3, name: '黄金', code: 'GC=F', icon: '🥇', category: 'metal', unit: '美元/盎司', yahooSymbol: 'GC=F' },
            { id: 4, name: '白银', code: 'SI=F', icon: '🥈', category: 'metal', unit: '美元/盎司', yahooSymbol: 'SI=F' },
            // 天然气
            { id: 5, name: '天然气', code: 'NG=F', icon: '🔥', category: 'gas', unit: '美元/MMBtu', yahooSymbol: 'NG=F' },
            // 外汇
            { id: 6, name: '欧元/美元', code: 'EURUSD=X', icon: '💶', category: 'currency', unit: '美元/欧元', yahooSymbol: 'EURUSD=X' },
            { id: 7, name: '英镑/美元', code: 'GBPUSD=X', icon: '💷', category: 'currency', unit: '美元/英镑', yahooSymbol: 'GBPUSD=X' },
            { id: 8, name: '美元/日元', code: 'JPY=X', icon: '💴', category: 'currency', unit: '日元/美元', yahooSymbol: 'JPY=X' }
        ];

        let currentCategory = 'all';
        let priceData = {};

        // 使用Yahoo Finance API获取实时数据 - 通过CORS代理
        async function fetchYahooFinance(symbol) {
            try {
                // 使用免费的CORS代理服务
                const corsProxies = [
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`)}`,
                    `https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`)}`,
                ];
                
                for (const proxyUrl of corsProxies) {
                    try {
                        const response = await fetch(proxyUrl, {
                            method: 'GET',
                            headers: { 'Accept': 'application/json' }
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            if (data.chart && data.chart.result && data.chart.result[0]) {
                                const result = data.chart.result[0];
                                const meta = result.meta;
                                const lastPrice = meta.regularMarketPrice || meta.previousClose;
                                const prevClose = meta.chartPreviousClose || meta.previousClose;
                                const change = lastPrice - prevClose;
                                const changePct = (change / prevClose) * 100;
                                
                                return {
                                    price: lastPrice,
                                    change: change,
                                    changePct: changePct,
                                    prevClose: prevClose,
                                    isReal: true,
                                    timestamp: new Date().toISOString()
                                };
                            }
                        }
                    } catch (e) {
                        console.log(`Proxy failed:`, e.message);
                        continue;
                    }
                }
                return null;
            } catch (error) {
                console.error(`Error fetching ${symbol}:`, error);
                return null;
            }
        }

        // 获取所有商品价格
        async function fetchAllPrices() {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = '';
            
            for (const item of commodities) {
                const data = await fetchYahooFinance(item.yahooSymbol);
                if (data) {
                    priceData[item.id] = { ...data, ...item };
                } else {
                    // 使用模拟数据作为备选
                    priceData[item.id] = {
                        ...item,
                        price: getSimulatedPrice(item.yahooSymbol),
                        change: (Math.random() - 0.5) * 2,
                        changePct: (Math.random() - 0.5) * 3,
                        isSimulated: true
                    };
                }
                // 延迟避免请求过快
                await new Promise(resolve => setTimeout(resolve, 200));
            }
            
            renderCards();
            updateStats();
            updateLastUpdateTime();
        }

        // 模拟价格（基于真实市场大致范围）
        function getSimulatedPrice(symbol) {
            const prices = {
                'BZ=F': 93.0,      // 布伦特原油
                'CL=F': 89.0,      // WTI原油
                'GC=F': 2170,      // 黄金
                'SI=F': 24.5,      // 白银
                'NG=F': 3.2,       // 天然气
                'EURUSD=X': 1.08,  // 欧元
                'GBPUSD=X': 1.26,  // 英镑
                'JPY=X': 149.5     // 日元
            };
            const base = prices[symbol] || 100;
            return base + (Math.random() - 0.5) * base * 0.02;
        }

        // 渲染价格卡片
        function renderCards() {
            const grid = document.getElementById('pricesGrid');
            const filtered = currentCategory === 'all' 
                ? commodities 
                : commodities.filter(c => c.category === currentCategory);

            grid.innerHTML = filtered.map(item => {
                const data = priceData[item.id];
                if (!data) return '';
                
                const isUp = data.change >= 0;
                const trendClass = isUp ? 'up' : 'down';
                const changeClass = isUp ? 'change-up' : 'change-down';
                const trendIcon = isUp ? '↑' : '↓';
                const simulatedBadge = data.isSimulated ? '<span style="font-size:0.7em;color:#666;">(模拟)</span>' : '';

                return `
                    <div class="price-card ${trendClass}">
                        <div class="card-header">
                            <div class="commodity-info">
                                <span class="commodity-icon">${item.icon}</span>
                                <div>
                                    <div class="commodity-name">${item.name} ${simulatedBadge}</div>
                                    <div class="commodity-code">${item.code}</div>
                                </div>
                            </div>
                            <div class="trend-indicator ${isUp ? 'trend-up' : 'trend-down'}">
                                ${trendIcon} ${Math.abs(data.changePct).toFixed(2)}%
                            </div>
                        </div>
                        <div class="price-display">
                            <div class="price-value">$${data.price.toFixed(2)}</div>
                            <div class="price-unit">${item.unit}</div>
                        </div>
                        <div>
                            <span class="price-change ${changeClass}">
                                ${isUp ? '+' : ''}${data.change.toFixed(2)} (${isUp ? '+' : ''}${data.changePct.toFixed(2)}%)
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新统计
        function updateStats() {
            const oilItems = commodities.filter(c => c.category === 'oil');
            let avgOil = 0;
            let count = 0;
            oilItems.forEach(item => {
                if (priceData[item.id]) {
                    avgOil += priceData[item.id].price;
                    count++;
                }
            });
            if (count > 0) {
                document.getElementById('avgOil').textContent = '$' + (avgOil / count).toFixed(2);
                document.getElementById('avgOil').classList.remove('loading');
            }

            // 最高涨幅和最大跌幅
            let maxGain = -Infinity;
            let maxLoss = Infinity;
            Object.values(priceData).forEach(data => {
                if (data.changePct > maxGain) maxGain = data.changePct;
                if (data.changePct < maxLoss) maxLoss = data.changePct;
            });
            
            if (maxGain !== -Infinity) {
                document.getElementById('topGainer').textContent = '+' + maxGain.toFixed(2) + '%';
            }
            if (maxLoss !== Infinity) {
                document.getElementById('topLoser').textContent = maxLoss.toFixed(2) + '%';
            }
        }

        // 更新时间
        function updateLastUpdateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('lastUpdate').textContent = timeStr;
        }

        // 分类筛选
        function filterCategory(category, element) {
            currentCategory = category;
            document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');
            renderCards();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            fetchAllPrices();
            // 每60秒刷新一次
            setInterval(fetchAllPrices, 60000);
        });
    </script>
</body>
</html>
